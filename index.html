<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>قناة الأطفال التعليمية</title>

<style>

body{
font-family: Arial, sans-serif;
background: linear-gradient(135deg,#1A1A2E,#16213E);
color:white;
text-align:center;
margin:0;
}

header{
background:#FF6B6B;
padding:20px;
font-size:28px;
font-weight:bold;
}

.container{
padding:40px 20px;
}

.card{
background:#0F3460;
padding:25px;
margin:20px auto;
border-radius:15px;
max-width:500px;
box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

h2{
color:#FFD93D;
}

button{
background:#4D96FF;
border:none;
padding:12px 25px;
border-radius:10px;
color:white;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#3b7ad9;
}

footer{
margin-top:40px;
padding:20px;
color:#aaa;
}

</style>
</head>

<body>

<header>
قناة الأطفال التعليمية المضحكة
</header>

<div class="container">

<div class="card">
<h2>مرحبا بكم</h2>
<p>
هذه صفحة بسيطة لخطة إنشاء قناة يوتيوب للأطفال
تجمع بين التعليم والمرح.
</p>
</div>

<div class="card">
<h2>هدف القناة</h2>
<p>
تعليم الأطفال بطريقة ممتعة من خلال القصص
والتجارب والألعاب التعليمية.
</p>
</div>

<div class="card">
<h2>اشترك في القناة</h2>
<button>اذهب إلى يوتيوب</button>
</div>

</div>

<footer>
© 2025 قناة الأطفال
</footer>

</body>
</html>
